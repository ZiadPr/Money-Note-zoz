version: 2.1

jobs:
  build-android:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      
      - run:
          name: Setup Environment
          command: |
            # تحديث النظام وتثبيت الجافا المطلوبة للأندرويد
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jdk
            # تثبيت أداة Tauri عالمياً
            sudo npm install -g @tauri-apps/cli

      - run:
          name: Install Project Dependencies
          command: |
            # تنظيف المجلدات لضمان تثبيت سليم للملفات الأصلية (Native Bindings)
            rm -rf node_modules package-lock.json
            # تثبيت المكتبات مع تحديد نوع النظام لضمان تحميل ملفات Linux x64
            sudo npm install --include=optional --platform=linux --arch=x64

      - run:
          name: Build Signed APK
          command: |
            # ربط متغيرات البيئة السرية من CircleCI ببيئة بناء Tauri
            export TAURI_ANDROID_KEYSTORE_PATH="$CIRCLE_WORKING_DIRECTORY/my-release-key.keystore"
            export TAURI_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
            export TAURI_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS
            export TAURI_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
            
            # تنفيذ أمر البناء مع الإصلاح (استخدام -- مرتين قبل release)
            sudo tauri android build --apk -- --release

      - store_artifacts:
          path: src-tauri/gen/android/app/build/outputs/apk/release/
          destination: apks

workflows:
  version: 2
  build:
    jobs:
      - build-android
