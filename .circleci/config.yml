version: 2.1

orbs:
  node: circleci/node@6.3.0

# ─── Executors ────────────────────────────────────────────────────────────────
executors:
  node-executor:
    docker:
      - image: cimg/node:22.19
    resource_class: medium

  android-executor:
    docker:
      - image: cimg/android:2024.01-node
    resource_class: large

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  # 1. Install Node dependencies and cache them
  install:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          cache-version: v1
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  # 2. Lint TypeScript/React source with ESLint
  lint:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run ESLint
          command: npm run lint

  # 3. Run Vitest unit tests
  test:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run Vitest tests
          command: npm run test
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

  # 4. Build the Vite web app
  build-web:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Build Vite web app
          command: npm run build
      - store_artifacts:
          path: dist
          destination: web-dist

  # 5. Build the Android APK via Tauri
  build-android:
    executor: android-executor
    steps:
      - checkout
      - run:
          name: Install Node dependencies
          command: npm install --include=optional
      - run:
          name: Install Rust toolchain
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
            rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
            echo 'source "$HOME/.cargo/env"' >> "$BASH_ENV"
      - run:
          name: Accept Android SDK licenses and install NDK
          command: |
            yes | sdkmanager --licenses || true
            yes | sdkmanager "ndk;26.1.10909125"
            echo 'export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125' >> "$BASH_ENV"
            echo 'export NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125'         >> "$BASH_ENV"
      - run:
          name: Install Tauri CLI
          command: sudo npm install -g @tauri-apps/cli
      - run:
          name: Initialize Tauri Android project
          command: tauri android init --ci --skip-targets-install
      - run:
          name: Build Android APK (aarch64 + armv7)
          command: tauri android build --ci --apk --target aarch64 --target armv7
      - store_artifacts:
          path: src-tauri/gen/android/app/build/outputs/apk/
          destination: apks

# ─── Workflows ────────────────────────────────────────────────────────────────
workflows:
  ci:
    jobs:
      - install

      # lint and test run in parallel after install
      - lint:
          requires:
            - install
      - test:
          requires:
            - install

      # web build runs after lint + test pass
      - build-web:
          requires:
            - lint
            - test

      # Android build runs after install (independent pipeline)
      - build-android:
          requires:
            - install

