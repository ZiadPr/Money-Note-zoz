version: 2.1

jobs:
  build-android:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      
      - run:
          name: Setup Environment
          command: |
            # تحديث المستودعات وتثبيت الجافا
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jdk
            
            # تثبيت CLI الخاص بـ Tauri مع صلاحيات الـ root
            sudo npm install -g @tauri-apps/cli

      - run:
          name: Install Project Dependencies
          command: |
            # تثبيت مكتبات المشروع
            sudo npm install --unsafe-perm

      - run:
          name: Build Signed APK
          command: |
            # إعداد متغيرات البيئة الخاصة بالتوقيع
            # تأكد أن ملف my-release-key.keystore موجود في المجلد الرئيسي للمشروع
            export TAURI_ANDROID_KEYSTORE_PATH="$CIRCLE_WORKING_DIRECTORY/my-release-key.keystore"
            export TAURI_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
            export TAURI_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS
            export TAURI_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
            
            # البدء في عملية بناء الـ APK للنسخة النهائية
            sudo npm run tauri android build -- --apk --release

      - store_artifacts:
          path: src-tauri/gen/android/app/build/outputs/apk/release/
          destination: apks

workflows:
  version: 2
  build:
    jobs:
      - build-android
