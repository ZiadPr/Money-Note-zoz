workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 120
    environment:
      vars:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
        NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
      node: latest
    scripts:
      - name: Find sdkmanager
        script: |
          find / -name "sdkmanager" 2>/dev/null
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT || echo "SDK dir not found"

      - name: Install Rust
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install dependencies
        script: npm install

      - name: Install Tauri CLI
        script: |
          source $HOME/.cargo/env
          cargo install tauri-cli --version "^2.0"

      - name: Build Vite
        script: npm run build

      - name: Init and Build Android APK
        script: |
          source $HOME/.cargo/env
          cargo tauri android init
          cargo tauri android build --apk

    artifacts:
      - src-tauri/gen/android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - zidplgoog@gmail.com
        notify:
          success: true
          failure: true
